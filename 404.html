                            display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <!-- Official Lucide / Heroicons Home SVG Path -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </div>
                    
                        <div data-magnetic-inner style="position: relative; overflow: hidden;">
                            <p class="text-roll-1"
                                style="transition: transform .7s cubic-bezier(0.075, 0.82, 0.165, 1);">
                                Back to Home
                            </p>
                            <p class="text-roll-2" style="transition: transform .7s cubic-bezier(0.075, 0.82, 0.165, 1); position: absolute; 
                                top: 0; left: 0; transform: translateY(100%); text-align: center; width: 100%;">Click
                                to Back</p>
                        </div>
                    </a>


                    <button class="roll-trigger" data-magnetic onclick="window.location.reload();"
                        style="padding: calc(var(--sfu)*.4) calc(var(--sfu)*1.75) calc(var(--sfu)*.4) calc(var(--sfu)*.4); border-radius: calc(var(--sfu)*5);
                           background-color: var(--color-btn-bg-secondary);  display: inline-flex; align-items: center; gap: calc(var(--sfu)*.75);
                           cursor: pointer; width: fit-content; border: calc(var(--sfu)*.0625) solid var(--color-btn-secondary-border); text-decoration: none;">

                        <div style="height: calc(var(--sfu)*2.6); width: calc(var(--sfu)*2.6); border-radius: 50%; background-color: var(--color-btn-secondary-icon-bg); display: flex;
                             align-items: center; justify-content: center; flex-shrink: 0;">
                            <!-- New Reload/Retry SVG Icon -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
                            </svg>
                        </div>

                        <div data-magnetic-inner style="position: relative; overflow: hidden;">
                            <p class="text-roll-1"
                                style="transition: transform .7s cubic-bezier(0.075, 0.82, 0.165, 1);">Retry</p>
                            <p class="text-roll-2" style="transition: transform .7s cubic-bezier(0.075, 0.82, 0.165, 1); position: absolute; 
                                top: 0; left: 0; transform: translateY(100%);">Click</p>
                        </div>
                    </button>

                </div>
            </div>

            <!-- Location -->
            <div class="location-widget" style=" justify-self: end;  height: calc(var(--sfu)*20);  width: calc(var(--sfu)*20);  border-radius: calc(var(--sfu)*1.75);
                background-color: #ffffff; padding: calc(var(--sfu)*1);
            ">
                <div
                    style="display: flex; align-items: center; gap: calc(var(--sfu)*.5); font-family: sans-serif; padding-bottom: calc(var(--sfu)*1);">
                    <!-- Globe Icon Container -->
                    <div class="location-badge" style=" background-color: #f5f5f5;  color: #1a1a1a;  padding: calc(var(--sfu)*.5); border-radius: calc(var(--sfu)*5);
                        border: calc(var(--sfu)*.0625) solid #e1e1e1; display: flex; align-items: center; justify-content: center;
                    ">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.8;">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                            </path>
                        </svg>
                    </div>

                    <!-- Heading Content -->
                    <div
                        style="display: flex; flex-direction: column; align-items: start; justify-content: center; gap: calc(var(--sfu)*.1);">
                        <span class="location-text" style="font-size: calc(var(--sfu)*1.25);">Pakistan</span>
                        <span style="color: var(--color-text-muted); font-size: calc(var(--sfu)*.8);">@Chowk Sarwar
                            Shaheed</span>
                    </div>
                </div>

                <div style="width: 100%; height: calc(100% - 3.5rem); border-radius: calc(var(--sfu)*1.75); background-color: var(--color-bg);
                    display: flex; align-items: center; justify-content: center;">
                    <img src="/public/svgs/pk.svg" alt="Pakistan" style="background-size: cover; height: 100%;">
                </div>

            </div>
        </section>
    </div>

    <footer style="width: 100%; display: flex; flex-direction: column;"></footer>

</body>

</html>
